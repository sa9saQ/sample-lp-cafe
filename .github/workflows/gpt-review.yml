# GPT 5.2 Code Review GitHub Action Template
# OpenAI API を使用した包括的コードレビュー（強化版）

name: GPT Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

  # 手動トリガー
  workflow_dispatch:
    inputs:
      review_focus:
        description: 'Review focus area'
        required: false
        type: choice
        options:
          - full
          - security
          - maintainability
          - performance
        default: full

permissions:
  contents: read
  pull-requests: write
  security-events: write

env:
  MAX_DIFF_SIZE: 100000
  OPENAI_MODEL: gpt-5.2

jobs:
  comprehensive-review:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff and metadata
        id: pr_data
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}

          # Get diff excluding non-code files
          DIFF=$(git diff origin/${{ github.event.pull_request.base.ref }}...HEAD \
            -- . ':!*.md' ':!*.json' ':!*.lock' ':!*.yaml' ':!*.yml' \
            ':!node_modules/*' ':!dist/*' ':!build/*' ':!*.min.js' ':!*.min.css' \
            ':!package-lock.json' ':!pnpm-lock.yaml' ':!yarn.lock' \
            | head -c ${{ env.MAX_DIFF_SIZE }})

          # Get changed files list
          CHANGED_FILES=$(git diff --name-only origin/${{ github.event.pull_request.base.ref }}...HEAD | head -50)

          # Get stats
          STATS=$(git diff --stat origin/${{ github.event.pull_request.base.ref }}...HEAD | tail -1)

          {
            echo 'diff<<EOF'
            echo "$DIFF"
            echo 'EOF'
            echo 'files<<EOF'
            echo "$CHANGED_FILES"
            echo 'EOF'
            echo "stats=$STATS"
          } >> "$GITHUB_OUTPUT"

      - name: Run security checks
        id: security
        continue-on-error: true
        run: |
          # npm audit if applicable
          if [ -f package.json ]; then
            npm audit --json 2>/dev/null > npm-audit.json || true
            VULNS=$(cat npm-audit.json | jq '.metadata.vulnerabilities // {}' 2>/dev/null || echo '{}')
            echo "npm_vulns=$VULNS" >> $GITHUB_OUTPUT
          fi

          # Check for secrets patterns
          SECRETS_FOUND=$(grep -rn --include="*.ts" --include="*.js" --include="*.tsx" --include="*.jsx" \
            -E "(api[_-]?key|secret|password|token|credential).*['\"][a-zA-Z0-9]{16,}['\"]" . 2>/dev/null | head -5 || echo "")
          {
            echo 'secrets<<EOF'
            echo "$SECRETS_FOUND"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: GPT Comprehensive Review
        id: review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DIFF_CONTENT: ${{ steps.pr_data.outputs.diff }}
          CHANGED_FILES: ${{ steps.pr_data.outputs.files }}
          PR_STATS: ${{ steps.pr_data.outputs.stats }}
          NPM_VULNS: ${{ steps.security.outputs.npm_vulns }}
          SECRETS_FOUND: ${{ steps.security.outputs.secrets }}
        run: |
          if [ -z "$DIFF_CONTENT" ]; then
            echo "result=レビュー対象のコード変更がありません ✅" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Build comprehensive review prompt
          SYSTEM_PROMPT='あなたは経験豊富なシニアソフトウェアエンジニア兼セキュリティ専門家です。
          コードレビューでは以下の5つの観点から徹底的に分析してください。

          ## 1. セキュリティ分析 (CRITICAL)

          ### OWASP Top 10 2021 チェック:
          - A01: アクセス制御の不備 - 認可バイパス、権限昇格
          - A02: 暗号化の失敗 - 弱い暗号化、シークレット露出
          - A03: インジェクション - SQL、NoSQL、OS コマンド、LDAP
          - A04: 安全でない設計 - 脅威モデリング欠如
          - A05: セキュリティ設定ミス - デフォルト設定、不要機能
          - A06: 脆弱なコンポーネント - 古い依存関係、既知のCVE
          - A07: 認証の失敗 - 認証バイパス、セッション管理
          - A08: データ整合性の失敗 - 未署名データ、安全でないデシリアライズ
          - A09: ログ記録の失敗 - 監査ログ欠如、ログインジェクション
          - A10: SSRF - サーバーサイドリクエストフォージェリ

          ### 追加セキュリティチェック:
          - ハードコードされた認証情報（APIキー、パスワード、トークン）
          - 安全でない正規表現（ReDoS脆弱性）
          - パストラバーサル脆弱性
          - XSS（クロスサイトスクリプティング）
          - CSRF保護
          - 公開エンドポイントのレート制限
          - 入力のサニタイズと検証

          ## 2. バグ・エラー分析

          ### ロジックエラー:
          - オフバイワンエラー
          - Null/undefined参照処理
          - 競合状態と並行性の問題
          - 無限ループまたは再帰
          - 誤ったブール論理
          - エッジケース処理（空配列、null、境界値）

          ### エラーハンドリング:
          - キャッチされない例外
          - 欠落したtry-catchブロック
          - サイレント失敗（アクションなしのcatch）
          - エラーメッセージの情報漏洩
          - 適切なエラー伝播

          ### 型安全性:
          - 型強制の問題
          - 安全でない型アサーション
          - 欠落したnullチェック
          - any/unknown型の乱用

          ## 3. 保守性分析

          ### コード複雑性:
          - サイクロマティック複雑度 > 10（関数をフラグ）
          - 深くネストされたコード（> 3レベル）
          - 長い関数（> 50行）
          - 大きなファイル（> 500行）
          - 神クラス/モジュール

          ### コード品質:
          - DRY違反（重複コード）
          - SOLID原則違反
          - 不明確な命名規則
          - マジックナンバー/文字列
          - デッドコード
          - TODO/FIXME/HACKコメント

          ### 可読性:
          - 欠落または古いドキュメント
          - 説明なしの複雑な式
          - 一貫性のないコーディングスタイル
          - 紛らわしい制御フロー

          ## 4. 脆弱性評価

          ### 依存関係セキュリティ:
          - 既知の脆弱なパッケージ
          - セキュリティパッチのある古い依存関係
          - 不要な依存関係（攻撃対象領域）
          - ライセンス互換性の問題

          ### データ保護:
          - PII/機密データの露出
          - 不十分なデータ検証
          - 機密データの暗号化欠如
          - 安全でないデータ送信

          ## 5. メンテナンス品質

          ### テストカバレッジ:
          - 新しいコードの単体テスト欠如
          - エッジケーステスト欠如
          - 壊れたまたは不安定なテスト
          - テスト品質（アサーション、モッキング）

          ### ドキュメント:
          - APIドキュメント欠如
          - 古いREADME
          - 複雑なロジックのインラインコメント欠如
          - 変更ログ更新の必要性

          ### 技術的負債:
          - リファクタリングすべき回避策
          - 非推奨API使用
          - パフォーマンスアンチパターン
          - スケーラビリティの懸念

          ---

          ## 出力フォーマット（必ず以下の形式で出力）

          ## 🔒 セキュリティレポート
          | 重大度 | 問題 | 場所 | CWE | 修正案 |
          |--------|------|------|-----|--------|
          | CRITICAL | ... | file:line | CWE-XXX | ... |
          | HIGH | ... | ... | ... | ... |

          ## 🐛 バグレポート
          | 優先度 | 問題 | 場所 | 影響 | 修正案 |
          |--------|------|------|------|--------|
          | P0 | ... | file:line | ... | ... |

          ## 🔧 保守性レポート
          | カテゴリ | 問題 | 場所 | 提案 |
          |----------|------|------|------|
          | 複雑性 | ... | ... | ... |

          ## 📦 依存関係レポート
          | パッケージ | 現在 | 問題 | アクション |
          |-----------|------|------|----------|

          ## 📊 サマリー
          - セキュリティスコア: X/10
          - バグリスク: X/10
          - 保守性: X/10
          - テストカバレッジ: 推定X%
          - 総合: ✅ 承認 / ⚠️ 要修正 / ❌ ブロック

          ## 🚨 すべてのCRITICAL問題（必須修正）
          発見されたすべてのCRITICAL問題を列挙。件数制限なし。

          ## ⚠️ すべてのHIGH優先度問題
          発見されたすべてのHIGH問題を列挙。件数制限なし。

          ## 📝 すべてのMEDIUM優先度問題
          発見されたすべてのMEDIUM問題を列挙。件数制限なし。

          ## 💡 LOW優先度/提案
          発見されたすべてのLOW問題と改善提案を列挙。件数制限なし。

          重要: 各カテゴリですべての発見を出力すること。Top 3などの制限は禁止。
          問題がないカテゴリは「✅ 問題なし」と記載'

          # Build the user message with context
          USER_MESSAGE="## 変更されたファイル
          $CHANGED_FILES

          ## 変更統計
          $PR_STATS

          ## npm脆弱性情報
          $NPM_VULNS

          ## シークレットパターン検出
          $SECRETS_FOUND

          ## コード差分
          $DIFF_CONTENT"

          # Create JSON payload
          PAYLOAD=$(jq -n \
            --arg system "$SYSTEM_PROMPT" \
            --arg user "$USER_MESSAGE" \
            '{
              "model": "gpt-4o",
              "messages": [
                {"role": "system", "content": $system},
                {"role": "user", "content": $user}
              ],
              "max_completion_tokens": 8000,
              "temperature": 0.1
            }')

          RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -d "$PAYLOAD")

          # Check for API errors
          if echo "$RESPONSE" | jq -e '.error' > /dev/null 2>&1; then
            ERROR_MSG=$(echo "$RESPONSE" | jq -r '.error.message // "Unknown API error"')
            echo "API Error: $ERROR_MSG" >&2
            REVIEW="⚠️ API エラー: $ERROR_MSG"
          else
            REVIEW=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "レビュー生成に失敗しました"')
          fi

          {
            echo 'result<<EOF'
            echo "$REVIEW"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Post review comment
        uses: actions/github-script@v7
        env:
          REVIEW_RESULT: ${{ steps.review.outputs.result }}
          PR_STATS: ${{ steps.pr_data.outputs.stats }}
        with:
          script: |
            const review = process.env.REVIEW_RESULT || 'レビュー結果がありません';
            const stats = process.env.PR_STATS || '';
            const now = new Date().toISOString().replace('T', ' ').substring(0, 19) + ' UTC';

            const body = [
              '## 🤖 GPT-4o Comprehensive Code Review',
              `📅 ${now}`,
              `📊 Changes: ${stats}`,
              '',
              review,
              '',
              '---',
              '*Powered by OpenAI GPT-4o | Multi-dimensional Security & Quality Analysis*'
            ].join('\n');

            // Find existing comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' &&
              c.body.includes('GPT-4o Comprehensive Code Review')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: body
              });
            }

  # セキュリティ特化レビュー（[security]タグ付きPR）
  security-focused-review:
    runs-on: ubuntu-latest
    if: |
      github.event.pull_request.draft == false &&
      (contains(github.event.pull_request.title, '[security]') ||
       contains(github.event.pull_request.labels.*.name, 'security'))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}
          DIFF=$(git diff origin/${{ github.event.pull_request.base.ref }}...HEAD \
            -- . ':!*.md' ':!*.json' ':!*.lock' | head -c ${{ env.MAX_DIFF_SIZE }})
          {
            echo 'content<<EOF'
            echo "$DIFF"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: GPT Security Audit
        id: security_review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DIFF_CONTENT: ${{ steps.diff.outputs.content }}
        run: |
          SYSTEM_PROMPT='あなたはペネトレーションテスターとセキュリティ監査の専門家です。
          攻撃者の視点でコードを徹底的に分析してください。

          ## Phase 1: 攻撃対象領域分析
          - すべてのエントリーポイント（API、フォーム、ファイルアップロード）を特定
          - 認証・認可フローをマッピング
          - データフローと信頼境界を特定

          ## Phase 2: 脆弱性ハンティング

          ### 認証・セッション
          - 弱いパスワードポリシー
          - セッション固定/ハイジャック
          - JWT脆弱性（noneアルゴリズム、弱いシークレット）
          - OAuth/OIDC設定ミス
          - Remember me機能の問題

          ### 認可
          - IDOR（安全でない直接オブジェクト参照）
          - 水平/垂直権限昇格
          - 関数レベルアクセス制御欠如
          - ロールバイパス脆弱性

          ### インジェクション攻撃
          - SQLインジェクション（全バリアント）
          - NoSQLインジェクション
          - コマンドインジェクション
          - LDAPインジェクション
          - XPathインジェクション
          - テンプレートインジェクション（SSTI）
          - ヘッダーインジェクション

          ### クライアントサイド
          - XSS（格納型、反射型、DOMベース）
          - CSRF
          - クリックジャッキング
          - オープンリダイレクト
          - PostMessage脆弱性

          ### サーバーサイド
          - SSRF
          - XXE（XML外部エンティティ）
          - デシリアライゼーション脆弱性
          - ファイルインクルージョン（LFI/RFI）
          - パストラバーサル

          ### 暗号
          - 弱いアルゴリズム（MD5、SHA1、DES）
          - 不十分な鍵長
          - 予測可能な乱数値
          - 暗号化欠如
          - 証明書検証の問題

          ### ビジネスロジック
          - 競合状態
          - 価格操作
          - 数量改ざん
          - ワークフローバイパス
          - TOCTOU（Time-of-check to time-of-use）

          ## Phase 3: シークレットスキャン
          - コード内のAPIキー
          - データベース認証情報
          - 秘密鍵
          - クラウドプロバイダーシークレット
          - 環境変数漏洩

          ---

          ## 出力フォーマット

          # 🛡️ セキュリティ監査レポート

          ## エグゼクティブサマリー
          - クリティカル発見: X件
          - 高リスク発見: X件
          - 総合リスクスコア: X/100

          ## 詳細な発見

          ### [CRITICAL] 発見タイトル
          - **CWE**: CWE-XXX
          - **CVSS**: X.X
          - **場所**: file:line
          - **説明**: ...
          - **PoC**: （該当する場合）
          - **影響**: ...
          - **修正案**: ...
          - **参考文献**: ...

          ## 攻撃シナリオ
          1. シナリオ: ...
             手順: ...
             影響: ...

          ## 修正優先度
          1. [CRITICAL] 即座に修正: ...
          2. [HIGH] 24時間以内に修正: ...
          3. [MEDIUM] 1週間以内に修正: ...

          ## セキュリティ強化推奨事項
          - ...'

          PAYLOAD=$(jq -n \
            --arg system "$SYSTEM_PROMPT" \
            --arg diff "$DIFF_CONTENT" \
            '{
              "model": "gpt-4o",
              "messages": [
                {"role": "system", "content": $system},
                {"role": "user", "content": $diff}
              ],
              "max_completion_tokens": 8000,
              "temperature": 0.1
            }')

          RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -d "$PAYLOAD")

          if echo "$RESPONSE" | jq -e '.error' > /dev/null 2>&1; then
            ERROR_MSG=$(echo "$RESPONSE" | jq -r '.error.message // "Unknown API error"')
            REVIEW="⚠️ API エラー: $ERROR_MSG"
          else
            REVIEW=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "レビュー生成に失敗しました"')
          fi

          {
            echo 'result<<EOF'
            echo "$REVIEW"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Post security review comment
        uses: actions/github-script@v7
        env:
          REVIEW_RESULT: ${{ steps.security_review.outputs.result }}
        with:
          script: |
            const review = process.env.REVIEW_RESULT || 'レビュー結果がありません';
            const now = new Date().toISOString().replace('T', ' ').substring(0, 19) + ' UTC';

            const body = [
              '## 🛡️ GPT-4o Security Audit',
              `📅 ${now}`,
              '',
              review,
              '',
              '---',
              '*Powered by OpenAI GPT-4o | Penetration Testing Perspective*'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: body
            });
