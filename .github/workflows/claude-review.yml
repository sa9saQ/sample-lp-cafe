# Claude Code GitHub Action Template
# PRの自動レビュー、@claude mention対応
# レビュー特化プラグイン（code-review, pr-review-toolkit, security-guidance）搭載
#
# 使い方:
# 1. このファイルを .github/workflows/claude.yml にコピー
# 2. リポジトリのSecrets に ANTHROPIC_API_KEY を設定

name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: "@claude"
          # レビュー特化プラグイン (公式マーケットプレイス)
          plugins: |
            code-review@claude-plugins-official
            pr-review-toolkit@claude-plugins-official
            security-guidance@claude-plugins-official
          # PR自動レビュー（PRオープン/更新時）
          prompt: |
            PRがオープンまたは更新されました。以下の包括的レビューを実行してください：

            1. /code-review を実行（CLAUDE.md準拠、バグ検出、履歴分析）

            2. pr-review-toolkit の各エージェントを活用:
               - テストカバレッジ分析（pr-test-analyzer）
               - サイレントエラー検出（silent-failure-hunter）
               - 型設計分析（type-design-analyzer）
               - コメント精度確認（comment-analyzer）

            3. セキュリティ観点のレビュー:
               - OWASP Top 10 脆弱性チェック
               - 認証・認可の問題
               - 入力検証の不備
               - 機密情報の露出

            重要度の高い問題のみ報告し、信頼度80以上の指摘に絞ってください。
            日本語でレビュー結果をコメントしてください。
